---
- name: Install Cart
  hosts: cart
  tasks:
  - name: Enable module nodejs 20
    ansible.builtin.command: dnf module enable nodejs:20 -y
  - name: Install nodejs
    ansible.builtin.package:
      name: nodejs
      state: present
  - name: Add user roboshop
    ansible.builtin.user:
      name: roboshop
      home: /app
      system: true
      shell: /sbin/nologin
      comment: "roboshop system user"
  - name: Delete Directory /app
    ansible.builtin.file:
    path: /app
    state: absent
  - name: Create directory /app
    ansible.builtin.file:
      path: /app
    state: directory
  - name: Delete downloaded cart zip file
    ansible.builtin.file:
    path: /tmp/cart.zip
    state: absent
  - name: Download package from url
    ansible.builtin.get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip
    dest: /tmp/cart.zip
  - name: Unarchive the catalogue zip folder
    ansible.builtin.unarchive:
      src: /tmp/cart.zip
      dest: /app
  - name: npm download dependencies
    community.general.npm:
      path: /app
      state: present
  - name: Copy Catalog Service file
    ansible.builtin.template:
      src: catalogue.service
      dest: /etc/systemd/system/
  - name: Reload systemd daemon
    ansible.builtin.systemd_service:
      daemon_reload: true
  - name: Enable and Start Catalogue Service
    ansible.builtin.service:
      name: Catalogue
      enabled: true
      state: started
