---
- name: Deploy instances for Roboshop Project
  hosts: all
  connection: local
  vars:
    ami_id: "ami-0220d79f3f480ecf5"
    sg_id: "sg-0950784120973742b"
    subnet_id: "subnet-06a0137ee419d9703"
    env: dev
    action: create
    domain_name: daws88s.shop
    Instances:
    - mongodb
    - catalogue
  tasks:
  - name: Deploy Instance for each Component
    amazon.aws.ec2_instance:
      name: "{{ item }}-{{ env }}"
      instance_type: "t3.micro"
      image_id: "{{ ami_id }}"
      security_group: "{{ sg_id }}"
      vpc_subnet_id: "{{ subnet_id }}"
      tags:
        Name: "{{ item }}-{{ env }}"
        Project: "Roboshop"
        Component: "{{ item }}"
    loop: "{{ Instances }}"
    when: action == "create"
    register: ec2_output

  - name: Get ec2 output
    ansible.builtin.debug:
      msg: "{{ ec2_output.results }}"

  - name: Create record for the Component
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      #Example: catalogue-daws88s.shop
      record: "{{ item }}"
      type: A
      ttl: 2
      value: item.instances[0].private_ip_address
    loop: "{{ Instances }}"

  - name: Delete Instance for each Component
    amazon.aws.ec2_instance:
      state: absent
      name: "{{ item }}-{{ env }}"
      filters:
        "tag:Name": "{{ item }}-{{ env }}"
    loop: "{{ Instances }}"
    when: action == "delete"
