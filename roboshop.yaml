---
- name: Deploy instances for Roboshop Project
  hosts: all
  connection: local
  vars:
    ami_id: "ami-0220d79f3f480ecf5"
    sg_id: "sg-0950784120973742b"
    subnet_id: "subnet-06a0137ee419d9703"
    Project: "Roboshop"
    env: dev
    action: create
    domain_name: daws88s.shop
    Instances:
    - mongodb
    - catalogue
    - frontend
    - redis
    - user
    - cart
    - shipping
    - payment
  tasks:
  - name: Install botocore and boto3 for connectivity with aws console
    ansible.builtin.pip:
      name: "{{ item }}"
    loop:
    - botocore
    - boto3
  - name: Deploy Instance for each Component
    amazon.aws.ec2_instance:
      name: "{{ item }}-{{ env }}"
      instance_type: "t3.micro"
      image_id: "{{ ami_id }}"
      security_group: "{{ sg_id }}"
      vpc_subnet_id: "{{ subnet_id }}"
      tags:
        Name: "{{ item }}-{{ env }}"
        Project: "{{ Project }}"
        Component: "{{ item }}"
    loop: "{{ Instances }}"
    when: action == "create"
    register: ec2_output

  - name: Get ec2 output
    ansible.builtin.debug:
      msg: "{{ ec2_output.results }}"

  - name: Create record for the Components
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      #Example: catalogue-dev.daws88s.shop
      record: "{{ item.item }}-{{ env }}.{{ domain_name }}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: false
      overwrite: true
    loop: "{{ ec2_output.results }}"
    when:
    - action == "create"
    - item.item != "frontend"

  - name: Create record for the Frontend
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      #Example: catalogue-dev.daws88s.shop
      record: "{{ Project }}-{{ env }}.{{ domain_name }}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].public_ip_address }}"
      wait: false
      overwrite: true
    loop: "{{ ec2_output.results }}"
    when:
    - action == "create"
    - item.item == "frontend"

  - name: Delete record for the Components
    amazon.aws.route53:
      state: absent
      zone: "{{ domain_name }}"
      type: A
      #Example: catalogue-dev.daws88s.shop
      record: "{{ item.item }}-{{ env }}.{{ domain_name }}"
      wait: false
    loop: "{{ ec2_output.results }}"
    when:
    - action == "delete"
    - item.item != "frontend"

  - name: Delete record for the Roboshop (frontend)
    amazon.aws.route53:
      state: absent
      zone: "{{ domain_name }}"
      type: A
      #Example: roboshop-dev.daws88s.shop
      record: "{{ Project }}-{{ env }}.{{ domain_name }}"
      wait: false
    loop: "{{ ec2_output.results }}"
    when:
    - action == "delete"
    - item.item == "frontend"

  - name: Delete Instance for each Component
    amazon.aws.ec2_instance:
      state: absent
      name: "{{ item }}-{{ env }}"
      filters:
        "tag:Name": "{{ item }}-{{ env }}"
    loop: "{{ Instances }}"
    when: action == "delete"
