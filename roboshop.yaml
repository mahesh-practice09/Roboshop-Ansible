---
- name: Deploy instances for Roboshop Project
  hosts: all
  connection: local
  vars:
    ami_id: "ami-0220d79f3f480ecf5"
    sg_id: "sg-0950784120973742b"
    env: dev
    instances:
    - mongodb
  tasks:
  - name: Deploy Instance for each Component
    amazon.aws.ec2_instance:
      name: "{{ item }}-{{ env }}"
      instance_type: "t3.micro"
      image_id: ami_id
      security_group: sg_id
      vpc_subnet_id: "subnet-06a0137ee419d9703"
      network_interfaces:
      - assign_public_ip: true
      tags:
        Name: "{{ instances }}-{{ env }}"
        Project: "Roboshop"
        Component: "{{ Instances }}"
    loop: "{{ instances }}"
