---
- name: Install User
  hosts: user
  become: true
  tasks:
  - name: Enable module nodejs
    ansible.builtin.shell: dnf module enable nodejs:20 -y
  - name: Install nodejs:20
    ansible.builtin.package:
      name: nodejs
      state: present
  - name: Add user roboshop
    ansible.builtin.user:
      name: roboshop
      home: /app
      system: true
      shell: /sbin/nologin
      comment: "roboshop system user"
  - name: Delete Directory /app
    ansible.builtin.file:
      path: /app
      state: absent
  - name: Create directory /app
    ansible.builtin.file:
      path: /app
      state: directory
  - name: Delete downloaded user zip file
    ansible.builtin.file:
      path: /tmp/user.zip
      state: absent
  - name: Download user package from url
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip
      dest: /tmp/user.zip
  - name: Unarchive the user zip folder
    ansible.builtin.unarchive:
      src: /tmp/user.zip
      dest: /app
      remote_src: yes
  - name: npm download dependencies
    community.general.npm:
      path: /app
      state: present
  - name: Copy user Service file
    ansible.builtin.template:
      src: user.service
      dest: /etc/systemd/system/
  - name: Reload systemd daemon
    ansible.builtin.systemd_service:
      daemon_reload: true
  - name: Enable and Start user Service
    ansible.builtin.service:
      name: user
      enabled: true
      state: restarted
