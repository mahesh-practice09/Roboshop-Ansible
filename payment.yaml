---
- name: Install Payment
  hosts: payment
  become: true
  tasks:
  - name: Install Python gcc python3-devel
    ansible.builtin.package:
      name: "{{ item }}"
      state: present
    loop:
    - python3
    - gcc
    - python3-devel
  - name: Add user roboshop
    ansible.builtin.user:
      name: roboshop
      home: /app
      system: true
      shell: /sbin/nologin
      comment: "roboshop system user"
  - name: Delete app Directory
    ansible.builtin.file:
      path: /app
      state: absent
  - name: Create app Directory
    ansible.builtin.file:
      path: /app
      state: directory
  - name: Delete downloaded payment zip file
    ansible.builtin.file:
      path: /tmp/payment.zip
      state: absent
  - name: Download url payment.zip
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
      dest: /tmp/payment.zip
  - name: Unarchive payment.zip
    ansible.builtin.unarchive:
      src: /tmp/payment.zip
      dest: /app
      remote_src: yes
  - name: Install required dependencies using requirements.txt
    ansible.builtin.pip:
      name: requirements.txt
      executable: pip3.9
      chdir: /app
  - name: Copy payment.service
    ansible.builtin.template:
      src: payment.service
      dest: /etc/systemd/system/
  - name: Reload systemd daemon
    ansible.builtin.systemd_service:
      daemon_reload: true
  - name: Enable and Start payment Service
    ansible.builtin.service:
      name: payment
      enabled: true
      state: restarted
